<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="app">
  <header>
    <h1><i class="ti ti-book-2"></i> Story Tracker</h1>
    <div class="toolbar-actions">
      <button id="add-char-btn"><i class="ti ti-user-plus"></i> Add character</button>
      <button id="add-event-btn"><i class="ti ti-plus"></i> Add event</button>
      <div class="divider"></div>
      <button id="save-btn" title="Save data to a JSON file"><i class="ti ti-download"></i> Save</button>
      <button id="load-btn" title="Load data from a JSON file"><i class="ti ti-upload"></i> Load</button>
      <input type="file" id="load-input" accept=".json" style="display:none" />
    </div>
  </header>

  <!-- Two-panel grid -->
  <div id="grid-outer">

    <!-- LEFT: pinned time column -->
    <div id="panel-left">
      <div class="col-header">
        <i class="ti ti-clock" style="font-size:13px"></i> Time / Event
      </div>
      <div id="panel-left-body"></div>
    </div>

    <!-- RIGHT: scrollable character columns -->
    <div id="panel-right">
      <div id="panel-right-head">
        <div id="panel-right-head-inner"></div>
      </div>
      <div id="panel-right-body">
        <div id="right-rows"></div>
        <div class="add-row-wrap">
          <button class="add-row-btn" id="add-row-bottom">
            <i class="ti ti-plus"></i> Add event / moment
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="toast" class="toast" aria-live="polite"></div>

<script src="js/state.js"></script>
<script src="js/render.js"></script>
<script src="js/io.js"></script>
<script src="js/main.js"></script>
</body>
</html>
